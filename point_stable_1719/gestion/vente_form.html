{% extends 'gestion/base.html' %}
{% block content %}
<div class="container py-4">
    <h3 class="mb-4">{{ title }}</h3>
    <form method="POST" class="card p-4 shadow-sm">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">👤 Client</label>
                <input type="text" name="client" class="form-control" placeholder="Nom ou 'Comptoir'" required>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">📦 Plateaux</label>
                <input type="number" name="plateaux" class="form-control" min="1" required>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">💰 Prix / plateau (F)</label>
                <input type="number" name="prix_plateau" class="form-control" min="0" required>
            </div>
        </div>
        <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="fas fa-save me-2"></i>Valider la vente</button>
            <a href="/vente/add/" class="btn btn-outline-secondary">Annuler</a>
        </div>
    </form>
    <p class="text-muted mt-3"><i class="fas fa-info-circle me-1"></i>Le montant total sera calculé automatiquement.</p>
</div>
{% endblock %}
