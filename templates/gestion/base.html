{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"Tropic Volaille" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --sidebar-w: 250px; --vert: #1B5E20; --or: #D4A017; }
    body { background: #f4f6f8; }
    .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-w); background: #111827; color: #fff; padding: 1.5rem 1rem; z-index: 1000; transition: 0.3s; }
    .sidebar-brand { font-size: 1.3rem; font-weight: 700; margin-bottom: 2rem; color: var(--or); }
    .sidebar-brand span { color: #fff; }
    .nav-item { display: block; padding: 0.8rem 1rem; color: #cbd5e1; text-decoration: none; border-radius: 8px; margin-bottom: 0.4rem; transition: 0.2s; }
    .nav-item:hover, .nav-item.active { background: var(--vert); color: #fff; }
    .nav-divider { height: 1px; background: #374151; margin: 1rem 0; }
    .main-content { margin-left: var(--sidebar-w); padding: 1.5rem; min-height: 100vh; }
    .mobile-toggle { display: none; position: fixed; top: 1rem; left: 1rem; z-index: 1010; background: var(--vert); color: #fff; border: none; padding: 0.6rem; border-radius: 8px; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.show { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .mobile-toggle { display: block; }
    }
  </style>
</head>
<body>
  <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">☰ Menu</button>
  {% include 'gestion/sidebar.html' %}
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>document.addEventListener('click', e => { if(window.innerWidth<768 && !document.getElementById('sidebar').contains(e.target) && !document.querySelector('.mobile-toggle').contains(e.target)) document.getElementById('sidebar').classList.remove('show') })</script>
</body>
</html>
