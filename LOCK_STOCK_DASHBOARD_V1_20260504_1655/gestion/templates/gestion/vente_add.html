{% extends 'gestion/base.html' %}
{% block title %}💰 Nouvelle vente{% endblock %}
{% block content %}
<div class="container" style="max-width:600px; margin:2rem auto; padding:1rem;">
  <div class="card">
    <h2>💰 Enregistrer une vente</h2>
    <form method="post" action="">
      {% csrf_token %}
      
      <div class="form-group">
        <label>📅 Date</label>
        <input type="date" name="date" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>👤 Client</label>
        <input type="text" name="client" class="form-control" placeholder="Nom du client" required>
      </div>
      
      <div class="form-group">
        <label>📦 Nombre de plateaux</label>
        <input type="number" name="plateaux" class="form-control" min="1" inputmode="numeric" placeholder="Ex: 10" required>
      </div>
      
      <div class="form-group">
        <label>💰 Prix par plateau (FCFA)</label>
        <input type="number" name="prix" class="form-control" min="0" inputmode="numeric" placeholder="Ex: 3500" required>
      </div>
      
      <button type="submit" class="btn btn-success btn-block">💵 Valider la vente</button>
      <a href="{% url 'dashboard' %}" class="btn btn-secondary btn-block">↩ Annuler</a>
    </form>
  </div>
</div>
{% endblock %}
