{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Empêche le navigateur de mettre en cache cette page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Connexion - DOKAHA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
        .brand { text-align: center; margin-bottom: 1.5rem; color: #0d6efd; font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">🐔 DOKAHA</div>
        <h4 class="text-center mb-4">Connexion</h4>
        
        {% if form.errors %}
        <div class="alert alert-danger">
            Nom d'utilisateur ou mot de passe incorrect.
        </div>
        {% endif %}

        <!-- autocomplete="off" empêche le navigateur de remplir automatiquement avec l'ancien utilisateur -->
        <form method="post" action="{% url 'login' %}" autocomplete="off">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="id_username" class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" id="id_username" class="form-control" required autocomplete="off" autofocus>
            </div>
            
            <div class="mb-3">
                <label for="id_password" class="form-label">Mot de passe</label>
                <input type="password" name="password" id="id_password" class="form-control" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
    </div>
</body>
</html>
