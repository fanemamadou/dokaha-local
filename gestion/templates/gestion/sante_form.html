{% extends "gestion/base.html" %}
{% block content %}
<div class="container-fluid px-2 px-md-4 mt-3" style="max-width:700px">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold text-success mb-0">🩺 Saisie Santé</h3>
        <a href="/terrain/" class="btn btn-outline-secondary btn-sm">️ Retour</a>
    </div>
    <form method="POST" class="card shadow-sm p-3">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-bold">Type d'intervention *</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="type_sante" id="t1" value="vaccin" checked>
                <label class="btn btn-outline-success py-2" for="t1">💉 Vaccin</label>
                <input type="radio" class="btn-check" name="type_sante" id="t2" value="traitement">
                <label class="btn btn-outline-warning py-2" for="t2">💊 Traitement</label>
                <input type="radio" class="btn-check" name="type_sante" id="t3" value="vet">
                <label class="btn btn-outline-danger py-2" for="t3">🩺 Vétérinaire</label>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Concerné(s) *</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="type_depense" id="d1" value="generale" checked onchange="toggleP()">
                <label class="btn btn-outline-dark py-2" for="d1"> Générale</label>
                <input type="radio" class="btn-check" name="type_depense" id="d2" value="unique" onchange="toggleP()">
                <label class="btn btn-outline-dark py-2" for="d2">🐔 1 Poulailler</label>
                <input type="radio" class="btn-check" name="type_depense" id="d3" value="partagee" onchange="toggleP()">
                <label class="btn btn-outline-dark py-2" for="d3"> Partagée</label>
            </div>
        </div>
        <div id="zoneP" class="mb-3 d-none">
            <div id="sel1" class="d-none"><select name="poulailler_id" class="form-select form-select-lg"><option value="">-- Choisir --</option>{% for p in poulaillers %}<option value="{{ p.id }}">{{ p.nom }}</option>{% endfor %}</select></div>
            <div id="sel2" class="d-none"><div class="row g-2">{% for p in poulaillers %}<div class="col-6 col-md-4"><input type="checkbox" class="btn-check" name="poulaillers_partages" value="{{ p.id }}" id="c{{ p.id }}"><label class="btn btn-outline-success w-100 py-3 fw-bold" for="c{{ p.id }}">{{ p.nom }}</label></div>{% endfor %}</div></div>
        </div>
        <div class="mb-3"><label class="form-label fw-bold">Produit / Acte *</label><input type="text" name="produit" class="form-control form-control-lg" required placeholder="Ex: Gumboro, Antibiotique..."></div>
        <div class="mb-3"><label class="form-label fw-bold">Coût (FCFA)</label><input type="number" name="cout" class="form-control form-control-lg" min="0" step="1" placeholder="0"></div>
        <div class="mb-4"><label class="form-label fw-bold">Note</label><input type="text" name="note" class="form-control form-control-lg" placeholder="Dosage, Véto..."></div>
        {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags }} mb-3">{{ m }}</div>{% endfor %}{% endif %}
        <div class="d-grid gap-2"><button type="submit" class="btn btn-success btn-lg fw-bold">💾 ENREGISTRER</button><a href="/terrain/" class="btn btn-outline-secondary">Annuler</a></div>
    </form>
</div>
<script>function toggleP(){const t=document.querySelector('input[name="type_depense"]:checked').value,z=document.getElementById('zoneP'),s1=document.getElementById('sel1'),s2=document.getElementById('sel2');if(t==='generale'){z.classList.add('d-none')}else{z.classList.remove('d-none');s1.classList.toggle('d-none',t!=='unique');s2.classList.toggle('d-none',t!=='partagee')}}</script>
{% endblock %}
