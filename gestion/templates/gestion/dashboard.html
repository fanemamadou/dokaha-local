{% extends "gestion/base.html" %}
{% block content %}
<div class="alert alert-success fw-bold">✅ DASHBOARD RENDU AVEC SUCCÈS</div>
<div class="row mt-4">
    <div class="col-md-6">
        <div class="card p-4 bg-white shadow">
            <h5>🐔 Cheptel Total</h5>
            <h2 class="text-primary">{{ total_cheptel|default:0 }} sujets</h2>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-4 bg-white shadow">
            <h5>💰 Trésorerie</h5>
            <h2 class="text-success">{{ tresorerie|default:0|floatformat:0 }} FCFA</h2>
        </div>
    </div>
</div>
<div class="mt-4">
    <a href="/mortalite/ajouter/" class="btn btn-danger me-2">💀 Mortalité</a>
    <a href="/vente/oeufs/" class="btn btn-warning me-2">🥚 Vente Œufs</a>
    <a href="/credits/" class="btn btn-dark">🔔 Crédits</a>
</div>
{% endblock %}
